<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMARA Aesthetics - Approved Build 3.7</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@google/generative-ai@0.1.0/dist/index.browser.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
            colors: {
              rose: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c' },
              medical: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 900: '#0c4a6e' }

          }
        }
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-[#fafafa] text-slate-900 selection:bg-rose-100">
    <div id="app"></div>
    
    <div id="persistent-map-vault" class="hidden">
        <div id="map-canvas" class="w-full h-full rounded-[3.5rem]"></div>
    </div>

    <script src="script.js"></script>
